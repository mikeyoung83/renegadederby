media:
  # Homepage media
  - name: homepage_media
    label: Homepage Images
    input: src/assets/homepage
    output: ../../assets/homepage
    categories: [image]

  # Sponsors media
  - name: sponsors_media
    label: Sponsor Logos
    input: src/assets/sponsors
    output: ../../assets/sponsors
    categories: [image]

content:
  # --- HOMEPAGE ---
  - name: homepage
    label: Homepage Sections
    type: collection
    path: src/content/homepage
    filename: "{fields.title}.md"
    fields:
      - name: title
        label: Section Title
        type: string
      - name: order
        label: Display Order
        type: number
        default: 0
      - name: sectionImage
        label: Section Image
        type: image
        media: homepage_media
      - name: body
        label: Content Body
        type: rich-text

  # --- SPONSORS ---
  - name: sponsors
    label: Sponsors
    type: collection
    path: src/content/sponsors
    # Using the name for the filename to keep things organized
    filename: "{fields.name}.md"
    fields:
      - name: name
        label: Sponsor Name
        type: string
      - name: url
        label: Website URL
        type: string
        # Help text to remind users to include https://
        help: "Must be a full URL (e.g., https://renegadederbydames.com)"
      - name: logo
        label: Sponsor Logo
        type: image
        media: sponsors_media
      # Adding body even though it's not in your schema
      # just in case you want to add notes in the future
      - name: body
        label: Notes / Description
        type: rich-text

  # --- GAMES COLLECTION ---
  - name: games
    label: Games & Schedule
    type: collection
    path: src/content/games
    # Files will be saved as YYYY-MM-DD.md for clean sorting
    filename: "{fields.date}.md"
    fields:
      - name: date
        label: Game Date
        type: date
        help: "Select the date of the event"

      - name: location
        label: Location
        type: select
        options:
          values:
            - name: home
              label: Home
            - name: away
              label: Away

      - name: hostedBy
        label: Hosted By
        type: string
        help: "Optional: Name of the league hosting if it's an away game"

      - name: pricing
        label: Ticket Pricing
        type: string
        help: "e.g., $15 at the door, Kids under 10 free"

      - name: isTentative
        label: Event-wide Tentative Status
        type: boolean
        default: false
        help: "Check this if the whole date is still being finalized"

      # This handles the gameEntrySchema array from your config.ts
      - name: entries
        label: Individual Game Matches
        type: object
        list: true
        # This view block fixes the [object Object] in the list
        view:
          primary: "{title}"
          summary: "{time}"
        fields:
          - name: time
            label: Start Time
            type: date
            # This turns the date picker into a time picker
            options:
              time: true
              format: "h:mm aa" # e.g., 4:00 PM
          - name: title
            label: Matchup Title
            type: string
          - name: isTentative
            label: Match Tentative?
            type: boolean
            default: false

      - name: body
        label: Additional Notes
        type: rich-text
        help: "Optional: Any extra details not covered by the fields above"
