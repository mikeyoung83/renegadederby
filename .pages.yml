media:
  # Homepage media
  - name: homepage_media
    label: Homepage Images
    input: src/assets/homepage
    output: ../../assets/homepage
    categories: [image]

  # Sponsors media
  - name: sponsors_media
    label: Sponsor Logos
    input: src/assets/sponsors
    output: ../../assets/sponsors
    categories: [image]

content:
  # --- HOMEPAGE ---
  - name: homepage
    label: Homepage Sections
    type: collection
    path: src/content/homepage
    filename: "{fields.title}.md"
    fields:
      - name: title
        label: Section Title
        type: string
      - name: order
        label: Display Order
        type: number
        default: 0
      - name: sectionImage
        label: Section Image
        type: image
        media: homepage_media
      - name: body
        label: Content Body
        type: rich-text

  # --- SPONSORS ---
  - name: sponsors
    label: Sponsors
    type: collection
    path: src/content/sponsors
    # Using the name for the filename to keep things organized
    filename: "{fields.name}.md"
    fields:
      - name: name
        label: Sponsor Name
        type: string
      - name: url
        label: Website URL
        type: string
        # Help text to remind users to include https://
        help: "Must be a full URL (e.g., https://renegadederbydames.com)"
      - name: logo
        label: Sponsor Logo
        type: image
        media: sponsors_media
      # Adding body even though it's not in your schema
      # just in case you want to add notes in the future
      - name: body
        label: Notes / Description
        type: rich-text

  # --- GAMES ---
  - name: games
    label: Games & Schedule
    type: collection
    path: src/content/games
    # Filename uses the date for easy sorting in your code editor
    filename: "{fields.date}.md"
    fields:
      - name: date
        label: Game Date
        type: date
      - name: location
        label: Location
        type: select
        options:
          - label: Home (Simcoe County)
            value: home
          - label: Away
            value: away
      - name: hostedBy
        label: Hosted By
        type: string
        help: "Optional: Name of the league hosting the event"
      - name: pricing
        label: Ticket Pricing
        type: string
        help: "e.g., $15 at the door, Kids under 10 free"
      - name: isTentative
        label: Event-wide Tentative Status
        type: boolean
        default: false

      # This handles your gameEntrySchema array (Triple Headers)
      - name: entries
        label: Individual Game Matches
        type: list
        fields:
          - name: title
            label: Matchup Title
            type: string
            help: "e.g., Bombshell Battalion vs. Hogtown"
          - name: time
            label: Start Time
            type: string
            help: "e.g., 5:00 PM"
          - name: isTentative
            label: This Match is Tentative
            type: boolean
            default: false
