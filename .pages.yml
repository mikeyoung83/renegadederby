media:
  # Homepage media
  - name: homepage_media
    label: Homepage Images
    input: src/assets/homepage
    output: ../../assets/homepage
    categories: [image]

  # Sponsors media
  - name: sponsors_media
    label: Sponsor Logos
    input: src/assets/sponsors
    output: ../../assets/sponsors
    categories: [image]

  # Officials media
  - name: officials_media
    label: Officials Media
    input: src/assets/officials
    output: ../../assets/officials
    categories: [image]

content:
  # --- HOMEPAGE ---
  - name: homepage
    label: Homepage Sections
    type: collection
    path: src/content/homepage
    filename: "{fields.title}.md"
    fields:
      - name: title
        label: Section Title
        type: string
      - name: order
        label: Display Order
        type: number
        default: 0
      - name: sectionImage
        label: Section Image
        type: image
        media: homepage_media
      - name: body
        label: Content Body
        type: rich-text

  # --- SPONSORS ---
  - name: sponsors
    label: Sponsors
    type: collection
    path: src/content/sponsors
    # Using the name for the filename to keep things organized
    filename: "{fields.name}.md"
    fields:
      - name: name
        label: Sponsor Name
        type: string
      - name: url
        label: Website URL
        type: string
        # Help text to remind users to include https://
        help: "Must be a full URL (e.g., https://renegadederbydames.com)"
      - name: logo
        label: Sponsor Logo
        type: image
        media: sponsors_media
      - name: body
        label: Notes / Description
        type: rich-text

  # --- GAMES ---
  - name: games
    label: Games & Schedule
    type: collection
    path: src/content/games
    filename: "{fields.date}.md"
    fields:
      - name: date
        label: Game Date
        type: date

      - name: location
        label: Location
        type: select
        options:
          values:
            - name: home
              label: Home
            - name: away
              label: Away

      - name: isTentative
        label: Event-wide Tentative Status
        type: boolean
        default: false

      - name: hostedBy
        label: Hosted By
        type: string

      - name: pricing
        label: Ticket Pricing
        type: string

      - name: entries
        label: Individual Game Matches
        type: object
        list: true
        # This fixes the display label in the CMS sidebar/list
        view:
          primary: "{title}"
          summary: "{time}"
        fields:
          - name: time
            label: Start Time
            type: string
          - name: title
            label: Matchup Title
            type: string

      - name: body
        label: Additional Notes
        type: rich-text

  # --- OFFICIALS ---
  - name: officials
    label: Officials
    type: collection
    path: src/content/officials
    view:
      primary: "{name}"
    fields:
      - name: name
        label: Official Name
        type: string

      - name: photo
        label: Official Photo
        type: image
        media: officials_media
