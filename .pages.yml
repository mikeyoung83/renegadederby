# pages.yml
content:
  - name: players
    label: Players
    type: collection
    path: src/content/players
    format: md
    # This is the secret sauce: tell PagesCMS what goes in the frontmatter
    fields:
      - name: name
        label: Skater Name
        type: string
      - name: number
        label: Jersey Number
        type: string
      - name: photo
        label: Skater Photo
        type: image
        upload_dir: src/assets/players
        public_path: ../../assets/players
      - name: body
        label: Bio / Content
        type: rich-text
