media:
  - name: homepage_media
    label: Homepage Images
    input: src/assets/homepage
    output: ../../assets/homepage
    categories: [image]

content:
  # --- HOMEPAGE ---
  - name: homepage
    label: Homepage Sections
    type: collection
    path: src/content/homepage
    filename: "{fields.title}.md"
    fields:
      - name: title
        label: Section Title
        type: string
      - name: order
        label: Display Order
        type: number
        default: 0
      - name: sectionImage
        label: Section Image
        type: image
        media: homepage_media
      - name: body
        label: Content Body
        type: rich-text
